  <body>
    <header>
      <nav>
        <ul class="menu">
          <li><a href="./index.html">Inicio</a></li>
          <li><a href="./perros.html">Perros</a></li>

        </ul>
      </nav>
    </header>
    <main>
      <h1>Alta de Nuevo Cliente</h1>

      <form action="#" method="get">
        <p>
          <label for="nombre">Nombre:</label><br />
          <input
            type="text"
            id="nombre"
            name="nombre"
            placeholder="Escribe tu nombre"
            required
          />
        </p>

        <p>
          <label for="apellidos">Apellidos:</label><br />
          <input
            type="text"
            id="apellidos"
            name="apellidos"
            placeholder="Escribe tus apellidos"
            required
          />
        </p>

        <p>
          <label for="direccion">Dirección:</label><br />
          <input
            type="text"
            id="direccion"
            name="direccion"
            placeholder="Ej: Calle Mayor, 1"
            required
          />
        </p>

        <button type="submit">Enviar datos</button>
      </form>
      <br />
      <a href="./index.html">Volver a la página principal</a>
      <div class="lema">
        <p>DATE DE ALTA COMO CLIENTE PARA TENER VENTAJAS</p>
      </div>
    </main>
    <footer>
      <p>Bienvenido. Ya eres miembro de "Tu Mascota". Muchas Gracias</p>
    </footer>
  </body>
